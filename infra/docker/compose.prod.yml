services:
  db:
    ports:
      - "${POSTGRES_PORT}:5432"

  prometheus:
    ports:
      - "${PROMETHEUS_PORT}:9090"

  grafana:
    ports:
      - "${GRAFANA_PORT}:3000"

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    ports:
      - "${SPRING_BOOT_PORT}:8080"

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "${REACT_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s